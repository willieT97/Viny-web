<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viny Venue Profile</title>
  <style>
    :root {
      --bg-0: #0a0d10;
      --bg-1: #151a20;
      --ink: #f4f7fb;
      --muted: #9aa7b5;
      --line: rgba(255, 255, 255, 0.12);
      --card: rgba(255, 255, 255, 0.04);
      --brand: #ff2e2e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 46, 46, 0.15), transparent 32%),
        radial-gradient(circle at 86% 86%, rgba(58, 130, 255, 0.16), transparent 36%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1));
    }
    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
    }
    .topbar h1 { margin: 0; font-size: clamp(20px, 2.8vw, 28px); }
    .muted { color: var(--muted); margin: 0; font-size: 14px; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .btn:hover { border-color: rgba(255, 255, 255, 0.35); background: rgba(255, 255, 255, 0.1); }
    .btn.brand { border: none; background: linear-gradient(180deg, #ff3a3a, var(--brand)); }
    .status {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 16px;
    }
    .card h2 { margin: 0 0 10px; font-size: 18px; }
    .card .intro { margin: 0 0 14px; color: var(--muted); line-height: 1.45; }
    .form-grid { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; color: #d6dce3; font-weight: 600; }
    .field input, .field textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .field input:focus, .field textarea:focus {
      border-color: rgba(255, 58, 58, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 46, 46, 0.2);
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .upload-row input[type="file"] { max-width: 100%; padding: 8px; }
    .preview-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    #venue-image-preview {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      display: none;
    }
    .form-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .form-note { color: var(--muted); font-size: 13px; }
    #venue-status { min-height: 18px; font-size: 14px; font-weight: 600; }
    #venue-status.ok { color: #3bdd8b; }
    #venue-status.err { color: #ff9494; }
    #venue-status.warn { color: #ffcd70; }
    #upload-status { font-size: 13px; color: var(--muted); min-height: 18px; }
    @media (max-width: 900px) { .row-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <div id="status" class="status">Checking session...</div>

    <header class="topbar">
      <div>
        <h1>Venue Profile</h1>
        <p class="muted" id="welcome-line">Signed in as ...</p>
      </div>
      <div class="actions">
        <a class="btn" href="venue-content.html">Venue Content</a>
        <a class="btn" href="index.html">Open Public Map</a>
        <button class="btn brand" id="sign-out" type="button">Sign Out</button>
      </div>
    </header>

    <article class="card">
      <h2>Profile Setup</h2>
      <p class="intro">Set your venue details so artists and fans can find you.</p>
      <form id="venue-form" class="form-grid">
        <div class="row-2">
          <div class="field">
            <label for="venue-name">Venue Name</label>
            <input id="venue-name" type="text" placeholder="Your venue name" required />
          </div>
          <div class="field">
            <label for="town">Town</label>
            <input id="town" type="text" placeholder="Portlaoise" />
          </div>
        </div>
        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Tell people about your venue"></textarea>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="website-url">Website URL</label>
            <input id="website-url" type="url" placeholder="https://yourvenue.com" />
          </div>
          <div class="field">
            <label for="instagram-url">Instagram URL</label>
            <input id="instagram-url" type="url" placeholder="https://instagram.com/..." />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="maps-url">Google Maps URL</label>
            <input id="maps-url" type="url" placeholder="https://maps.google.com/..." />
          </div>
          <div class="field">
            <label for="image-url">Profile Image URL</label>
            <input id="image-url" type="url" placeholder="https://.../venue.jpg" />
          </div>
        </div>
        <div class="field">
          <label for="image-file">Upload Profile Picture</label>
          <div class="upload-row">
            <input id="image-file" type="file" accept="image/*" />
            <button class="btn" id="upload-image" type="button">Upload Image</button>
          </div>
          <div class="preview-wrap">
            <img id="venue-image-preview" alt="Venue image preview" />
            <span id="upload-status">Upload an image to auto-fill profile image URL.</span>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn brand" id="save-venue" type="submit">Save Venue Profile</button>
          <span id="venue-status"></span>
        </div>
        <div class="form-note">Stored in Supabase table: <code>venue_profiles</code>.</div>
      </form>
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = window.SUPABASE_URL || "https://rxoybvdvarmlnrblffwe.supabase.co";
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "sb_publishable_YDXSqqWC-6GQXO8Pp2udgw_zOtM_m1e";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const welcomeEl = document.getElementById("welcome-line");
    const signOutBtn = document.getElementById("sign-out");
    const venueForm = document.getElementById("venue-form");
    const venueStatusEl = document.getElementById("venue-status");
    const uploadImageBtn = document.getElementById("upload-image");
    const imageFileEl = document.getElementById("image-file");
    const imageUrlEl = document.getElementById("image-url");
    const uploadStatusEl = document.getElementById("upload-status");
    const imagePreviewEl = document.getElementById("venue-image-preview");

    const VENUE_TABLE = "venue_profiles";
    const VENUE_IMAGE_BUCKET = "venue-images";
    let currentUser = null;

    function goLogin() {
      window.location.href = "login.html";
    }

    function setVenueStatus(text, tone) {
      venueStatusEl.textContent = text || "";
      venueStatusEl.className = "";
      if (tone) venueStatusEl.classList.add(tone);
    }

    function setUploadStatus(text, tone) {
      uploadStatusEl.textContent = text || "";
      uploadStatusEl.style.color =
        tone === "ok" ? "#3bdd8b" :
        tone === "err" ? "#ff9494" :
        tone === "warn" ? "#ffcd70" :
        "";
    }

    function updateImagePreview(url) {
      const src = (url || "").trim();
      if (!src) {
        imagePreviewEl.style.display = "none";
        imagePreviewEl.removeAttribute("src");
        return;
      }
      imagePreviewEl.src = src;
      imagePreviewEl.style.display = "block";
    }

    function readVenuePayload() {
      return {
        venue_name: document.getElementById("venue-name").value.trim(),
        town: document.getElementById("town").value.trim(),
        description: document.getElementById("description").value.trim(),
        website_url: document.getElementById("website-url").value.trim(),
        instagram_url: document.getElementById("instagram-url").value.trim(),
        maps_url: document.getElementById("maps-url").value.trim(),
        image_url: imageUrlEl.value.trim()
      };
    }

    function applyVenueToForm(row) {
      document.getElementById("venue-name").value = row?.venue_name || "";
      document.getElementById("town").value = row?.town || "";
      document.getElementById("description").value = row?.description || "";
      document.getElementById("website-url").value = row?.website_url || "";
      document.getElementById("instagram-url").value = row?.instagram_url || "";
      document.getElementById("maps-url").value = row?.maps_url || "";
      imageUrlEl.value = row?.image_url || "";
      updateImagePreview(row?.image_url || "");
    }

    async function loadVenueProfile(userId) {
      const { data, error } = await sb
        .from(VENUE_TABLE)
        .select("venue_name, town, description, website_url, instagram_url, maps_url, image_url")
        .eq("user_id", userId)
        .maybeSingle();
      if (error) throw error;
      applyVenueToForm(data || {});
    }

    async function saveVenueProfile() {
      if (!currentUser?.id) return;
      const payload = readVenuePayload();
      if (!payload.venue_name) {
        setVenueStatus("Venue name is required.", "warn");
        return;
      }
      const row = {
        user_id: currentUser.id,
        ...payload,
        updated_at: new Date().toISOString()
      };
      const { error } = await sb.from(VENUE_TABLE).upsert(row, { onConflict: "user_id" });
      if (error) throw error;
      setVenueStatus("Venue profile saved.", "ok");
    }

    async function uploadVenueImage() {
      if (!currentUser?.id) return;
      const file = imageFileEl.files?.[0];
      if (!file) {
        setUploadStatus("Choose an image first.", "warn");
        return;
      }

      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const safeExt = ext.replace(/[^a-z0-9]/g, "") || "jpg";
      const path = `${currentUser.id}/venue-${Date.now()}.${safeExt}`;

      setUploadStatus("Uploading image...", "warn");
      const { error: uploadError } = await sb.storage
        .from(VENUE_IMAGE_BUCKET)
        .upload(path, file, { upsert: true, contentType: file.type || "image/jpeg" });
      if (uploadError) throw uploadError;

      const { data } = sb.storage.from(VENUE_IMAGE_BUCKET).getPublicUrl(path);
      const publicUrl = data?.publicUrl || "";
      imageUrlEl.value = publicUrl;
      updateImagePreview(publicUrl);
      setUploadStatus("Upload complete. Save profile to persist.", "ok");
    }

    async function init() {
      const { data, error } = await sb.auth.getSession();
      if (error || !data?.session?.user) {
        goLogin();
        return;
      }

      currentUser = data.session.user;
      const email = currentUser.email || "venue";
      welcomeEl.textContent = `Signed in as ${email}`;
      statusEl.textContent = "Session active.";

      try {
        await loadVenueProfile(currentUser.id);
      } catch (err) {
        setVenueStatus(
          "Could not load venue profile. Ensure table 'venue_profiles' exists with 'user_id' and proper RLS policy.",
          "err"
        );
      }
    }

    signOutBtn.addEventListener("click", async () => {
      await sb.auth.signOut();
      goLogin();
    });

    sb.auth.onAuthStateChange((event, session) => {
      if (event === "SIGNED_OUT" || !session) goLogin();
    });

    uploadImageBtn.addEventListener("click", async () => {
      try {
        await uploadVenueImage();
      } catch (err) {
        setUploadStatus(
          err?.message || "Upload failed. Ensure bucket 'venue-images' exists and policies allow uploads.",
          "err"
        );
      }
    });

    imageUrlEl.addEventListener("change", () => updateImagePreview(imageUrlEl.value));

    venueForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      setVenueStatus("Saving...", "warn");
      try {
        await saveVenueProfile();
      } catch (err) {
        setVenueStatus(err?.message || "Could not save venue profile.", "err");
      }
    });

    init().catch((err) => {
      statusEl.textContent = err?.message || "Could not initialize dashboard.";
    });
  </script>
</body>
</html>
